<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal de Admissão</title>
    <link rel="icon" type="image/png" href="LINK_DO_SEU_LOGO_ICON.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="portalFrame"></iframe>

    <script>
        // 1. A URL real do seu webhook no n8n
        const webhookUrl = "https://remuneracao.app.n8n.cloud/webhook/portal-candidato";
        
        // 2. Captura os parâmetros da URL (ex: ?email=candidato@teste.com)
        const params = window.location.search;
        
        // 3. Define o src do iframe com os mesmos parâmetros
        const iframe = document.getElementById('portalFrame');
        if (params) {
            iframe.src = webhookUrl + params;
        } else {
            // Se não houver email na URL, redireciona para erro ou home
            iframe.src = webhookUrl;
        }
    </script>
</body>
</html>
